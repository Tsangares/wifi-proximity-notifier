<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Device Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0d1117; color: #c9d1d9; padding: 20px;
  }
  h1 { color: #58a6ff; margin-bottom: 20px; }
  h2 { color: #8b949e; margin: 20px 0 10px; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }
  .stats {
    display: flex; gap: 15px; margin-bottom: 20px;
  }
  .stat-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 15px 25px; text-align: center;
  }
  .stat-box .num { font-size: 2em; font-weight: bold; color: #58a6ff; }
  .stat-box .label { color: #8b949e; font-size: 0.85em; }
  table {
    width: 100%; border-collapse: collapse; margin-bottom: 20px;
    background: #161b22; border-radius: 8px; overflow: hidden;
  }
  th { background: #21262d; color: #8b949e; text-align: left; padding: 10px 12px; font-weight: 600; font-size: 0.85em; text-transform: uppercase; }
  td { padding: 8px 12px; border-top: 1px solid #21262d; font-size: 0.9em; }
  tr:hover td { background: #1c2128; }
  .active-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .active-dot.on { background: #3fb950; }
  .active-dot.off { background: #6e7681; }
  .mac { font-family: monospace; color: #8b949e; font-size: 0.85em; }
  .device-type { color: #d2a8ff; font-weight: 500; }
  .editable-name {
    background: transparent; border: 1px solid transparent; color: #c9d1d9;
    padding: 2px 6px; border-radius: 4px; font-size: 0.9em; width: 120px;
    font-family: inherit;
  }
  .editable-name:hover { border-color: #30363d; }
  .editable-name:focus { border-color: #58a6ff; outline: none; background: #0d1117; }
  .event-connect { color: #3fb950; }
  .event-disconnect { color: #f85149; }
  .time-ago { color: #8b949e; font-size: 0.85em; }
  .refresh-note { color: #484f58; font-size: 0.8em; margin-top: 10px; }
  #activity-section { max-height: 400px; overflow-y: auto; }
</style>
</head>
<body>
<h1>WiFi Device Monitor</h1>
<div class="stats">
  <div class="stat-box"><div class="num" id="active-count">0</div><div class="label">Active</div></div>
  <div class="stat-box"><div class="num" id="total-count">0</div><div class="label">Total Known</div></div>
</div>

<h2>Active Devices</h2>
<table id="active-table">
  <thead><tr>
    <th></th><th>Name</th><th>Hostname</th><th>Type</th><th>Manufacturer</th><th>MAC</th><th>IP</th><th>First Seen</th><th>Last Seen</th>
  </tr></thead>
  <tbody id="active-body"></tbody>
</table>

<h2>Past Devices</h2>
<table id="inactive-table">
  <thead><tr>
    <th></th><th>Name</th><th>Hostname</th><th>Type</th><th>Manufacturer</th><th>MAC</th><th>IP</th><th>First Seen</th><th>Last Seen</th>
  </tr></thead>
  <tbody id="inactive-body"></tbody>
</table>

<h2>Activity Log</h2>
<div id="activity-section">
<table id="activity-table">
  <thead><tr>
    <th>Time</th><th>Event</th><th>Device</th><th>MAC</th><th>IP</th>
  </tr></thead>
  <tbody id="activity-body"></tbody>
</table>
</div>

<p class="refresh-note">Auto-refreshes every 10 seconds</p>

<script>
function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString();
}

function deviceRow(d, active) {
  const dot = `<span class="active-dot ${active ? 'on' : 'off'}"></span>`;
  const name = `<input class="editable-name" value="${d.custom_name || ''}" placeholder="unnamed" data-mac="${d.mac}" onchange="rename(this)">`;
  return `<tr>
    <td>${dot}</td>
    <td>${name}</td>
    <td>${d.hostname || ''}</td>
    <td class="device-type">${d.device_type}</td>
    <td>${d.manufacturer}</td>
    <td class="mac">${d.mac}</td>
    <td>${d.ip || ''}</td>
    <td class="time-ago" title="${fmtTime(d.first_seen)}">${timeAgo(d.first_seen)}</td>
    <td class="time-ago" title="${fmtTime(d.last_seen)}">${timeAgo(d.last_seen)}</td>
  </tr>`;
}

function activityRow(a) {
  const cls = a.event === 'connect' ? 'event-connect' : 'event-disconnect';
  const name = a.custom_name || a.device_type || '';
  return `<tr>
    <td class="time-ago" title="${fmtTime(a.timestamp)}">${timeAgo(a.timestamp)}</td>
    <td class="${cls}">${a.event}</td>
    <td>${name}</td>
    <td class="mac">${a.mac}</td>
    <td>${a.ip || ''}</td>
  </tr>`;
}

function rename(el) {
  fetch('/api/devices/' + encodeURIComponent(el.dataset.mac) + '/rename', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: el.value})
  });
}

function refresh() {
  fetch('/api/devices').then(r => r.json()).then(data => {
    document.getElementById('active-count').textContent = data.active.length;
    document.getElementById('total-count').textContent = data.active.length + data.inactive.length;
    document.getElementById('active-body').innerHTML = data.active.map(d => deviceRow(d, true)).join('');
    document.getElementById('inactive-body').innerHTML = data.inactive.map(d => deviceRow(d, false)).join('');
  });
  fetch('/api/activity?limit=50').then(r => r.json()).then(data => {
    document.getElementById('activity-body').innerHTML = data.map(activityRow).join('');
  });
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
