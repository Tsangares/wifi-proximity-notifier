<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Monitor</title>
<style>
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e8;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
    position: relative; z-index: 1;
  }

  .header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #00f0ff, #a855f7);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 {
    font-size: 1.5em; font-weight: 700; color: #e0e0e8;
  }
  .header-time {
    margin-left: auto; color: #55556a; font-size: 0.8em;
    font-variant-numeric: tabular-nums;
  }

  .card {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.3s;
  }

  .bento {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 16px;
  }

  /* Stats row */
  .stats { display: flex; gap: 16px; flex-direction: column; }
  .stat-card { text-align: center; padding: 24px 20px; }
  .stat-num {
    font-size: 2.8em; font-weight: 800; line-height: 1; margin-bottom: 4px;
    color: #fff;
  }
  .stat-label {
    color: #6b6b80; font-size: 0.75em; text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 600;
  }

  .section-title {
    font-size: 0.75em; text-transform: uppercase; letter-spacing: 1.5px;
    color: #55556a; font-weight: 600; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .count {
    background: rgba(255, 255, 255, 0.06); padding: 2px 8px;
    border-radius: 10px; color: #8b8b9e;
  }

  /* Device rows */
  .device-list { display: flex; flex-direction: column; gap: 4px; }

  .device-row {
    display: grid;
    grid-template-columns: auto 1fr 1fr 1fr 90px;
    gap: 12px; align-items: center;
    padding: 10px 14px; border-radius: 10px;
    transition: background 0.2s;
    animation: fadeIn 0.3s ease-out;
    border-left: 3px solid transparent;
  }
  .device-row:hover { background: rgba(255, 255, 255, 0.03); }
  .device-row-header {
    padding: 6px 14px 10px; color: #44445a; font-size: 0.7em;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
    border-left: 3px solid transparent;
  }
  .device-row-header:hover { background: transparent; }

  /* ONLINE row: bright, thick left border, full opacity */
  .device-row.online {
    border-left: 3px solid #fff;
    background: rgba(255, 255, 255, 0.025);
  }

  /* OFFLINE row: dim, dashed left border, reduced opacity */
  .device-row.offline {
    border-left: 3px dashed #333345;
    opacity: 0.45;
  }
  .device-row.offline:hover { opacity: 0.7; }

  /* Status badge — text label, not just a dot */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.7em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; white-space: nowrap;
  }
  .status-badge.online {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
  .status-badge.online .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #fff;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .status-badge.offline {
    background: rgba(255, 255, 255, 0.03);
    color: #555;
    border: 1px dashed #333;
  }
  .status-badge.offline .badge-dot {
    width: 6px; height: 6px;
    background: transparent;
    border: 1px solid #444;
    border-radius: 50%;
  }

  .device-name-wrap { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .device-secondary {
    font-size: 0.75em; color: #55556a;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .device-type { font-size: 0.82em; color: #a0a0b8; font-weight: 500; }
  .device-mfr { font-size: 0.78em; color: #55556a; }
  .device-mac {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75em; color: #44445a;
  }
  .device-ip {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.8em; color: #6b6b80;
  }
  .device-time { font-size: 0.78em; color: #55556a; text-align: right; }

  .editable-name {
    background: transparent; border: 1px solid transparent;
    color: #e0e0e8; font-weight: 600; padding: 2px 6px; margin: -2px -6px;
    border-radius: 6px; font-size: 0.9em; font-family: inherit;
    width: 100%; outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .editable-name::placeholder { color: #333345; font-weight: 400; }
  .editable-name:hover { border-color: rgba(255, 255, 255, 0.08); }
  .editable-name:focus {
    border-color: rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.03);
  }
  .offline .editable-name { color: #666; }

  /* Activity feed */
  .activity-feed {
    max-height: 520px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 0;
    scrollbar-width: thin; scrollbar-color: #222235 transparent;
  }
  .activity-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: 8px; transition: background 0.2s;
  }
  .activity-item:hover { background: rgba(255, 255, 255, 0.02); }

  /* Activity icons: arrow shapes instead of colored dots */
  .activity-icon {
    width: 22px; height: 22px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; flex-shrink: 0; margin-top: 1px;
  }
  .activity-icon.connect {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  .activity-icon.disconnect {
    background: transparent;
    color: #555;
    border: 1px dashed #333;
  }

  .activity-info { flex: 1; min-width: 0; }
  .activity-event { font-size: 0.8em; font-weight: 600; }
  .activity-event.connect { color: #fff; }
  .activity-event.disconnect { color: #555; }
  .activity-device {
    font-size: 0.75em; color: #55556a;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .activity-time { font-size: 0.7em; color: #44445a; white-space: nowrap; margin-top: 2px; }

  @media (max-width: 900px) {
    .bento { grid-template-columns: 1fr; }
    .stats { flex-direction: row; }
    .stat-card { flex: 1; }
    .device-row { grid-template-columns: auto 1fr 1fr; }
    .device-row .col-mac, .device-row .col-time,
    .device-row-header .col-mac, .device-row-header .col-time { display: none; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222235; border-radius: 4px; }

  .empty { color: #333345; font-size: 0.85em; text-align: center; padding: 30px 0; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">&#x1f4e1;</div>
    <h1>WiFi Monitor</h1>
    <div class="header-time" id="clock"></div>
  </div>

  <!-- Phones panel -->
  <div class="card" id="phones-card" style="margin-bottom: 16px;">
    <div class="section-title">Phones &amp; Tablets <span class="count" id="phones-badge">0</span></div>
    <div class="device-list">
      <div class="device-row device-row-header">
        <div>Status</div>
        <div>Device</div>
        <div>Type</div>
        <div class="col-mac">Address</div>
        <div class="col-time">Seen</div>
      </div>
      <div id="phones-list"></div>
    </div>
  </div>

  <div class="bento">
    <div class="card" id="active-card">
      <div class="section-title">Other Devices <span class="count" id="active-badge">0</span></div>
      <div class="device-list">
        <div class="device-row device-row-header">
          <div>Status</div>
          <div>Device</div>
          <div>Type</div>
          <div class="col-mac">Address</div>
          <div class="col-time">Seen</div>
        </div>
        <div id="active-list"></div>
      </div>
    </div>

    <div class="stats">
      <div class="card stat-card">
        <div class="stat-num" id="active-count">0</div>
        <div class="stat-label">Online Now</div>
      </div>
      <div class="card stat-card">
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-label">Total Known</div>
      </div>
    </div>

    <div class="card" id="past-card">
      <div class="section-title">Offline Devices <span class="count" id="past-badge">0</span></div>
      <div class="device-list">
        <div class="device-row device-row-header">
          <div>Status</div>
          <div>Device</div>
          <div>Type</div>
          <div class="col-mac">Address</div>
          <div class="col-time">Last Seen</div>
        </div>
        <div id="past-list"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Activity</div>
      <div class="activity-feed" id="activity-feed"></div>
    </div>
  </div>

</div>

<script>
function timeAgo(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 5) return 'just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString();
}

function deviceRow(d, active) {
  const statusCls = active ? 'online' : 'offline';
  const statusLabel = active ? 'ONLINE' : 'OFFLINE';
  const badge = `<span class="status-badge ${statusCls}"><span class="badge-dot"></span>${statusLabel}</span>`;

  const displayName = d.custom_name || '';
  const nameInput = `<input class="editable-name" value="${displayName}" placeholder="${d.device_type}" data-mac="${d.mac}" onchange="rename(this)" onfocus="this.select()">`;
  const secondary = d.ip || '';

  // data-key is a stable fingerprint of the row content (excluding time)
  const key = `${d.mac}|${statusCls}|${displayName}|${d.device_type}|${d.ip}`;

  return `<div class="device-row ${statusCls}" data-mac="${d.mac}" data-key="${key}">
    ${badge}
    <div class="device-name-wrap">
      ${nameInput}
      <div class="device-secondary">${secondary}</div>
    </div>
    <div>
      <div class="device-type">${d.device_type}</div>
      <div class="device-mfr">${d.manufacturer}</div>
    </div>
    <div class="col-mac">
      <div class="device-ip">${d.ip || ''}</div>
      <div class="device-mac">${d.mac}</div>
    </div>
    <div class="col-time device-time" data-ts="${d.last_seen}">${timeAgo(d.last_seen)}</div>
  </div>`;
}

function activityItem(a) {
  const cls = a.event === 'connect' ? 'connect' : 'disconnect';
  const icon = a.event === 'connect' ? '+' : '-';
  const label = a.event === 'connect' ? 'Connected' : 'Disconnected';
  const name = a.custom_name || a.device_type || a.mac;
  return `<div class="activity-item">
    <div class="activity-icon ${cls}">${icon}</div>
    <div class="activity-info">
      <div class="activity-event ${cls}">${label}</div>
      <div class="activity-device">${name} &middot; ${a.ip || ''}</div>
    </div>
    <div class="activity-time" data-ts="${a.timestamp}">${timeAgo(a.timestamp)}</div>
  </div>`;
}

function rename(el) {
  fetch('/api/devices/' + encodeURIComponent(el.dataset.mac) + '/rename', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: el.value})
  });
  el.blur();
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function isPhone(d) {
  const t = (d.device_type || '').toLowerCase();
  if (t.includes('android tv')) return false;
  if (t.includes('iphone') || t.includes('ipad') || t.includes('phone') || t.includes('tablet')) return true;
  if (t.includes('android') && !t.includes('tv') && !t.includes('streaming')) return true;
  return false;
}

function updateTimes() {
  document.querySelectorAll('.device-time[data-ts]').forEach(el => {
    el.textContent = timeAgo(el.dataset.ts);
  });
  document.querySelectorAll('.activity-time[data-ts]').forEach(el => {
    el.textContent = timeAgo(el.dataset.ts);
  });
}

function diffUpdate(container, newDevices, rowFn) {
  // Build map of existing rows by MAC
  const existing = {};
  container.querySelectorAll('[data-mac]').forEach(row => {
    existing[row.dataset.mac] = row;
  });

  // Track which MACs are in the new data
  const newMacs = new Set();
  const focusedEl = document.activeElement;
  const focusedMac = focusedEl && focusedEl.dataset ? focusedEl.dataset.mac : null;

  // Create a temporary container to parse new rows
  const tmp = document.createElement('div');

  newDevices.forEach((d, i) => {
    newMacs.add(d._mac);
    const oldRow = existing[d._mac];

    if (oldRow) {
      // Row exists — only update if content changed (not time)
      if (oldRow.dataset.key !== d._key) {
        tmp.innerHTML = d._html;
        const newRow = tmp.firstElementChild;
        container.replaceChild(newRow, oldRow);
      } else {
        // Just update the time
        const timeEl = oldRow.querySelector('.device-time[data-ts]');
        if (timeEl) {
          timeEl.dataset.ts = d._ts;
          timeEl.textContent = timeAgo(d._ts);
        }
      }
    } else {
      // New row — append
      tmp.innerHTML = d._html;
      const newRow = tmp.firstElementChild;
      newRow.style.animation = 'fadeIn 0.3s ease-out';
      container.appendChild(newRow);
    }
  });

  // Remove rows no longer in data
  container.querySelectorAll('[data-mac]').forEach(row => {
    if (!newMacs.has(row.dataset.mac)) {
      row.style.opacity = '0';
      row.style.transition = 'opacity 0.2s';
      setTimeout(() => row.remove(), 200);
    }
  });

  // Show empty message if needed
  const emptyEl = container.querySelector('.empty');
  if (newDevices.length === 0 && !emptyEl) {
    container.innerHTML = '<div class="empty">None</div>';
  } else if (newDevices.length > 0 && emptyEl) {
    emptyEl.remove();
  }

  // Restore focus
  if (focusedMac) {
    const input = container.querySelector(`[data-mac="${focusedMac}"]`);
    if (input) input.focus();
  }
}

function prepDevices(devices, active) {
  return devices.map(d => {
    const isActive = d._active !== undefined ? d._active : active;
    const statusCls = isActive ? 'online' : 'offline';
    const displayName = d.custom_name || '';
    const key = `${d.mac}|${statusCls}|${displayName}|${d.device_type}|${d.ip}`;
    return {
      _mac: d.mac,
      _key: key,
      _ts: d.last_seen,
      _html: deviceRow(d, isActive),
    };
  });
}

let lastActivityIds = '';

function refresh() {
  fetch('/api/devices').then(r => r.json()).then(data => {
    const all = [...data.active.map(d => ({...d, _active: true})),
                 ...data.inactive.map(d => ({...d, _active: false}))];
    const sortByLastSeen = (a, b) => new Date(b.last_seen) - new Date(a.last_seen);

    const phones = all.filter(d => isPhone(d)).sort(sortByLastSeen);
    const activeOther = data.active.filter(d => !isPhone(d)).sort(sortByLastSeen);
    const inactive = data.inactive.filter(d => !isPhone(d)).sort(sortByLastSeen);

    document.getElementById('active-count').textContent = data.active.length;
    document.getElementById('total-count').textContent = all.length;
    document.getElementById('phones-badge').textContent = phones.length;
    document.getElementById('active-badge').textContent = activeOther.length;
    document.getElementById('past-badge').textContent = inactive.length;

    diffUpdate(document.getElementById('phones-list'), prepDevices(phones));
    diffUpdate(document.getElementById('active-list'), prepDevices(activeOther, true));
    diffUpdate(document.getElementById('past-list'), prepDevices(inactive, false));
  });

  fetch('/api/activity?limit=30').then(r => r.json()).then(data => {
    // Only rebuild activity if the event list actually changed
    const ids = data.map(a => a.id).join(',');
    if (ids !== lastActivityIds) {
      document.getElementById('activity-feed').innerHTML = data.map(activityItem).join('');
      lastActivityIds = ids;
    }
    // Always update times
    updateTimes();
  });
}

updateClock();
setInterval(updateClock, 1000);
// Update times every second without fetching
setInterval(updateTimes, 1000);
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
